<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | O Melhor da Internet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-circle"><i class="fas fa-satellite-dish"></i></div>
            <div class="logo-text">RADAR<span>DEOFERTAS</span></div>
        </div>
        <div class="search-box">
            <input type="text" id="busca" placeholder="O que você quer comprar hoje?">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <nav class="nav-bar" id="menu-topo"></nav>

    <main class="container main-layout">
        <aside class="sidebar">
            <div class="filter-group">
                <h4><i class="fas fa-sort-amount-down"></i> Ordenar por</h4>
                <select id="sort-price">
                    <option value="default">Relevância</option>
                    <option value="low">Menor Preço</option>
                    <option value="high">Maior Preço</option>
                </select>
            </div>
            <div class="filter-group">
                <h4><i class="fas fa-th-large"></i> Categorias</h4>
                <div id="sidebar-cats"></div>
            </div>
        </aside>

        <section class="content">
            <div id="secao-expirando" class="expirando-container" style="display:none;">
                <div class="expirando-header">
                    <h2><i class="fas fa-clock"></i> OFERTAS EXPIRANDO</h2>
                    <div id="timer" class="timer">00:00:00</div>
                </div>
                <div class="grid-produtos" id="grid-expirando"></div>
            </div>

            <h2 id="titulo-pagina" style="margin-bottom: 20px; font-size: 1.2rem; color: #444;">Todos os Produtos</h2>
            <div id="lista-produtos" class="grid-produtos"></div>
            
            <div class="footer-carousel-section">
                <h3>Navegue por Categorias</h3>
                <div class="carousel-wrapper">
                    <div class="carousel-cats" id="footer-cats"></div>
                    <div class="nav-arrow" onclick="scrollCarousel('footer-cats')"><i class="fas fa-chevron-right"></i></div>
                </div>
            </div>

            <footer class="footer-note">
                <div class="note-box">
                    <p>O <strong>Radar de Ofertas</strong> monitora as melhores oportunidades. Ao clicar em "VER OFERTA", você será levado ao site oficial da loja parceira para concluir sua compra com segurança total.</p>
                </div>
            </footer>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
