<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container-ml">
            <div class="logo-row">
                <a href="#" class="logo">
                    <div class="logo-circle"><i class="fas fa-satellite-dish"></i></div>
                    <div class="logo-text">RADAR<span>DEOFERTAS</span></div>
                </a>
            </div>

            <div class="search-row">
                <div class="search-box">
                    <input type="text" id="input-busca" placeholder="O que você está procurando hoje?" autocomplete="off">
                    <button id="btn-busca"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <nav class="nav-bar">
                <div class="category-dropdown">
                    <button class="dropbtn">Categorias <i class="fas fa-chevron-down"></i></button>
                    <div class="dropdown-content" id="menu-categorias-dt"></div>
                </div>
                <div class="user-menu">
                    <a href="#">Crie sua conta</a>
                    <a href="#">Entre</a>
                    <a href="#"><i class="fas fa-shopping-cart"></i></a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="flash-deals-hero">
            <div class="header-container-ml">
                <div class="flash-header">
                    <div class="flash-title">
                        <i class="fas fa-bolt"></i>
                        <h2>OFERTAS EXPIRANDO</h2>
                    </div>
                    <div class="flash-timer">
                        <span class="timer-label">Termina em:</span>
                        <div id="timer" class="digital-clock">00:00:00</div>
                    </div>
                </div>
                <div class="flash-grid" id="grid-expirando"></div>
            </div>
        </section>

        <div class="header-container-ml">
            <section class="home-categories" id="secao-icones">
                <h2 class="section-title">Categorias populares</h2>
                <div class="categories-icon-grid" id="grid-icones-home"></div>
                <div class="show-more-center">
                    <button id="btn-expandir-home" onclick="toggleHomeCategorias()">Ver mais categorias</button>
                </div>
            </section>

            <div id="feed-infinito"></div>
            
            <div id="loader" class="loader">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
        </div>
    </main>

    <footer class="footer-ml">
        <div class="header-container-ml">
            <div class="footer-bottom">
                <p class="copyright">Copyright © 1999-2026 RadarDeOfertas LTDA.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
