<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | Marketplace Profissional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo-row">
                <div class="logo">
                    <div class="logo-circle"><i class="fas fa-satellite-dish"></i></div>
                    <div class="logo-text">RADAR<span>DEOFERTAS</span></div>
                </div>
            </div>
            <div class="search-row">
                <div class="search-box">
                    <input type="text" id="busca" placeholder="O que você está procurando hoje?" autocomplete="off">
                    <i class="fas fa-search"></i>
                    <div id="search-suggestions" class="search-suggestions"></div>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-bar-ml">
        <div class="nav-content-ml">
            <div class="category-dropdown">
                <button class="dropbtn">Categorias <i class="fas fa-chevron-down"></i></button>
                <div class="dropdown-content" id="mega-menu">
                    </div>
            </div>
            <a href="#" class="nav-item-ml">Ofertas</a>
            <a href="#" class="nav-item-ml">Cupons</a>
            <a href="#" class="nav-item-ml">Histórico</a>
            <a href="#" class="nav-item-ml">Contato</a>
        </div>
    </nav>

    <div class="mobile-filter-container">
        <div class="mobile-category-filter" id="mobile-category-filter"></div>
    </div>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-box">
                <h4>ORDENAR</h4>
                <select id="sort-price">
                    <option value="default">Relevância</option>
                    <option value="low">Menor Preço</option>
                    <option value="high">Maior Preço</option>
                </select>
            </div>
            <div class="sidebar-box">
                <h4>CATEGORIAS</h4>
                <div id="sidebar-cats"></div>
            </div>
        </aside>

        <main class="content">
            <section id="secao-expirando" class="expirando-block">
                <div class="expirando-header">
                    <h2><i class="fas fa-bolt"></i> OFERTAS EXPIRANDO</h2>
                    <div id="timer" class="timer">00:00:00</div>
                </div>
                <div class="grid-layout" id="grid-expirando"></div>
            </section>

            <div id="container-categorias"></div>
        </main>
    </div>

    <footer class="main-footer">
        <div class="footer-container">
            <section class="footer-categories-box">
                <div class="footer-header-ml">
                    <h3>Categorias Populares</h3>
                </div>
                <div class="categories-grid-ml" id="footer-cats"></div>
                <div class="show-more-container">
                    <a href="javascript:void(0)" id="btn-mostrar-mais" onclick="toggleCategorias()">
                        Mostrar mais categorias <i class="fas fa-chevron-down"></i>
                    </a>
                </div>
            </section>

            <div class="footer-bottom">
                <p>Copyright © 2026 Radar de Ofertas LTDA.</p>
                <p>CNPJ: 03.007.331/0001-41</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
