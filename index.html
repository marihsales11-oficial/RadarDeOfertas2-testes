<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | O seu Monitor de Preços Profissional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo"><i class="fas fa-search-dollar"></i> RADAR<span>DEOFERTAS</span></div>
        <div class="search-box">
            <input type="text" id="busca" placeholder="O que você quer comprar barato hoje?">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <nav class="nav-categories" id="menu-categorias"></nav>

    <section class="banner-urgencia">
        <div class="countdown-container">
            <h3><i class="fas fa-bolt"></i> OFERTAS QUE EXPIRAM EM: <span id="timer">00:00:00</span></h3>
        </div>
    </section>

    <div class="main-layout container">
        <aside class="sidebar">
            <div class="filter-group">
                <h4><i class="fas fa-sort-amount-down"></i> Ordenar por</h4>
                <select id="sort-price">
                    <option value="default">Relevância</option>
                    <option value="low">Menor Preço</option>
                    <option value="high">Maior Preço</option>
                </select>
            </div>

            <div class="filter-group">
                <h4><i class="fas fa-tags"></i> Categorias</h4>
                <div id="filter-categories-list">
                    </div>
            </div>
        </aside>

        <main class="content">
            <div id="sessao-urgente"></div>
            <div id="produtos-container"></div>
        </main>
    </div>

    <footer class="footer">
        <p><center><strong>Radar de Ofertas</strong> &copy; 2026 - Melhores achados do Mercado Livre.</center></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
