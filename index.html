<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | Estilo Mercado Livre</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-content-top">
            <div class="header-container-ml">
                <div class="logo">
                    <div class="logo-circle"><i class="fas fa-satellite-dish"></i></div>
                    <div class="logo-text">RADAR<span>DEOFERTAS</span></div>
                </div>
            </div>
        </div>
        <div class="header-content-search">
            <div class="header-container-ml">
                <div class="search-box">
                    <input type="text" id="busca" placeholder="Buscar produtos, marcas e muito mais...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>
        <div class="header-content-nav">
            <div class="header-container-ml">
                <nav class="nav-ml">
                    <div class="category-dropdown">
                        <button class="dropbtn">Categorias <i class="fas fa-chevron-down"></i></button>
                        <div class="dropdown-content" id="menu-categorias-dt">
                            </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <div class="mobile-category-bar" id="mobile-category-filter"></div>

    <main>
        <section id="secao-expirando" class="flash-deals-hero">
            <div class="header-container-ml">
                <div class="flash-header">
                    <div class="flash-title">
                        <i class="fas fa-bolt"></i>
                        <h2>OFERTAS EXPIRANDO</h2>
                    </div>
                    <div class="flash-timer">
                        <span>Termina em:</span>
                        <div id="timer" class="digital-clock">00:00:00</div>
                    </div>
                </div>
                <div class="flash-grid" id="grid-expirando">
                    </div>
            </div>
        </section>

        <div class="main-container-ml">
            <div id="container-categorias">
                </div>
            
            <div id="grid-produtos-infinito" class="flash-grid">
                </div>
            
            <div id="loading" class="loading-spinner" style="display:none;">
                <i class="fas fa-circle-notch fa-spin"></i> Carregando mais ofertas...
            </div>
        </div>
    </main>

    <footer class="main-footer-ml">
        <div class="main-container-ml">
            <section class="footer-categories-box">
                <div class="categories-grid-ml" id="footer-cats-grid">
                    </div>
                <div class="show-more-container-footer">
                    <button id="btn-mostrar-mais-footer" onclick="toggleFooterCategorias()">
                        Mostrar mais <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </section>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
