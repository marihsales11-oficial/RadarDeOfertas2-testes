<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | O Portal dos Achados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo"><i class="fas fa-radar"></i> RADAR<span>DEOFERTAS</span></div>
        <div class="search-box">
            <input type="text" id="busca" placeholder="O que você quer comprar barato hoje?">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <nav class="nav-shopee" id="menu-categorias"></nav>

    <main class="container main-layout">
        <aside class="sidebar">
            <div class="filter-group">
                <h4><i class="fas fa-sort"></i> Ordenar</h4>
                <select id="sort-price">
                    <option value="default">Destaques</option>
                    <option value="low">Menor Preço</option>
                    <option value="high">Maior Preço</option>
                </select>
            </div>
            <div class="filter-group">
                <h4><i class="fas fa-list"></i> Categorias</h4>
                <div id="sidebar-cats"></div>
            </div>
        </aside>

        <section class="content">
            <div id="area-expirando"></div>
            <div id="lista-produtos"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
