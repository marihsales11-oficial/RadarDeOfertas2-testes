<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | Estilo ML</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo-row">
                <div class="logo">
                    <div class="logo-circle"><i class="fas fa-satellite-dish"></i></div>
                    <div class="logo-text">RADAR<span>DEOFERTAS</span></div>
                </div>
                <div class="search-box">
                    <input type="text" id="busca" placeholder="Buscar produtos, marcas e muito mais...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
            
            <nav class="nav-ml">
                <div class="category-dropdown">
                    <button class="dropbtn">Categorias <i class="fas fa-chevron-down"></i></button>
                    <div class="dropdown-content" id="menu-categorias-dt">
                        </div>
                </div>
                <div class="nav-links-desktop">
                    <a href="#">Ofertas do Dia</a>
                    <a href="#">Histórico</a>
                    <a href="#">Vender</a>
                    <a href="#">Contato</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="mobile-category-bar" id="mobile-category-filter"></div>

    <main class="main-container">
        <section id="secao-expirando" class="flash-deals-hero">
            <div class="flash-container">
                <div class="flash-header">
                    <div class="flash-title">
                        <i class="fas fa-bolt"></i>
                        <h2>OFERTAS EXPIRANDO</h2>
                    </div>
                    <div class="flash-timer">
                        <span>Termina em:</span>
                        <div id="timer" class="digital-clock">00:00:00</div>
                    </div>
                </div>
                <div class="flash-grid" id="grid-expirando">
                    </div>
            </div>
        </section>

        <div class="content-layout">
            <div id="container-categorias">
                </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <section class="footer-categories-box">
                <div class="footer-header-ml">
                    <h3>Mais categorias</h3>
                </div>
                <div class="categories-grid-ml" id="footer-cats"></div>
                <div class="show-more-container">
                    <button id="btn-mostrar-mais" onclick="toggleCategorias()">
                        Mostrar mais <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </section>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
