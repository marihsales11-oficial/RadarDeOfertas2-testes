<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Ofertas | Estilo Mercado Livre</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-circle"><i class="fas fa-satellite-dish"></i></div>
                <div class="logo-text">RADAR<span>DEOFERTAS</span></div>
            </div>
            <div class="search-box">
                <input type="text" id="busca" placeholder="Buscar produtos, marcas e muito mais...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <nav class="nav-bar" id="menu-topo"></nav>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-box">
                <h4>ORDENAR POR</h4>
                <select id="sort-price">
                    <option value="default">Mais relevantes</option>
                    <option value="low">Menor preço</option>
                    <option value="high">Maior preço</option>
                </select>
            </div>
            <div class="sidebar-box">
                <h4>CATEGORIAS</h4>
                <div id="sidebar-cats"></div>
            </div>
        </aside>

        <main class="content">
            <section id="secao-expirando" class="expirando-block">
                <div class="section-header">
                    <div class="timer-wrapper">
                        <h2><i class="fas fa-bolt"></i> OFERTAS EXPIRANDO</h2>
                        <div id="timer" class="timer">00:00:00</div>
                    </div>
                </div>
                <div class="carousel-container">
                    <button class="arrow-btn prev" onclick="scrollCarousel('grid-expirando', -1)"><i class="fas fa-chevron-left"></i></button>
                    <div class="grid-carrossel" id="grid-expirando"></div>
                    <button class="arrow-btn next" onclick="scrollCarousel('grid-expirando', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </section>

            <div id="secoes-categorias"></div>
            
            <div id="busca-resultado" style="display:none;">
                <h2 class="section-title">Resultado da Busca</h2>
                <div id="grid-busca" class="grid-carrossel search-grid"></div>
            </div>
        </main>
    </div>

    <footer class="main-footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>SOBRE</h4>
                <p>O Radar de Ofertas monitora os melhores preços para você.</p>
            </div>
            <div class="footer-col">
                <h4>CATEGORIAS</h4>
                <ul id="footer-links"></ul>
            </div>
            <div class="footer-col">
                <h4>PAGAMENTO</h4>
                <div class="selos">
                    <i class="fab fa-cc-visa fa-2x"></i>
                    <i class="fab fa-cc-mastercard fa-2x"></i>
                    <i class="fas fa-barcode fa-2x"></i>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Radar de Ofertas - CNPJ: 00.000.000/0001-00</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
