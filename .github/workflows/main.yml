name: Atualizar Precos Diariamente

on:
  schedule:
    # Roda todos os dias às 06:00 (Horário de Brasília)
    - cron: '0 9 * * *' 
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3

    - name: Executar script de atualizacao
      run: |
        # Garantimos que o script rode mesmo se estiver dentro da pasta json
        # Se o seu .py estiver na raiz, apenas 'python Atualizar_precos.py' basta
        python Atualizar_precos.py

  - name: Salvar alteracoes no JSON
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Tenta adicionar o arquivo independente da pasta
        git add json/produtos.json || git add produtos.json
        
        # Verifica se houve mudanças antes de tentar o commit
        if git diff --staged --quiet; then
          echo "Nenhuma mudança encontrada nos preços. Pulando commit."
        else
          git commit -m "Auto: Atualização de preços"
          git push origin main
        fi
