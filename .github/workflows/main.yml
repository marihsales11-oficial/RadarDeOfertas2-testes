name: Atualizar Precos Diariamente

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: pip install requests urllib3

    - name: Executar script de atualizacao
      run: python Atualizar_precos.py

    - name: Salvar alteracoes no JSON
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add produtos.json
        # Se houver mudanças, ele faz o commit e usa o "force" para não dar erro de histórico
        if ! git diff --staged --quiet; then
          git commit -m "Auto: Atualizacao de precos"
          git push --force origin main
        else
          echo "Nenhuma mudanca detectada pelo Python"
        fi
