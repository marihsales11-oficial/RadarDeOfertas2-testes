<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador Pro - Radar de Ofertas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .drop-zone { border: 3px dashed #007bff; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; background: #f8f9fa; margin-bottom: 20px; transition: 0.3s; }
        .drop-zone.active { background: #e7f3ff; border-color: #0056b3; border-style: solid; }
        
        /* Painel de Estatísticas */
        .stats-panel { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; }
        .stat-card h4 { margin: 0; font-size: 12px; color: #666; text-transform: uppercase; }
        .stat-card span { font-size: 24px; font-weight: bold; color: #333; }

        #status-details { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #fff; border: 1px solid #eee; display: none; }
        .aba-badge { display: inline-block; background: #e9ecef; padding: 6px 12px; margin: 4px; border-radius: 6px; font-size: 13px; color: #444; border: 1px solid #dee2e6; }
        .aba-badge b { color: #007bff; }

        .btn-gen { background: #007bff; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-copy { background: #28a745; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; display: none; }
        textarea { width: 100%; height: 250px; margin-top: 15px; display: none; background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; border: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Radar de Ofertas - Importador Inteligente</h1>
    
    <div class="drop-zone" id="drop-zone">
        <strong>Clique ou Arraste seu arquivo .xlsx aqui</strong>
        <input type="file" id="file-input" style="display: none;" accept=".xlsx">
    </div>

    <div class="stats-panel" id="stats-panel">
        <div class="stat-card">
            <h4>Categorias Identificadas</h4>
            <span id="stat-cat">0</span>
        </div>
        <div class="stat-card">
            <h4>Total de Links (Produtos)</h4>
            <span id="stat-links">0</span>
        </div>
    </div>

    <div id="status-details">
        <h3 style="margin: 0 0 10px 0; font-size: 14px;">📂 Detalhes por Aba:</h3>
        <div id="abas-lista"></div>
    </div>

    <button class="btn-gen" id="btn-processar" style="display: none;" onclick="gerarJSON()">1. GERAR JSON PARA O PYTHON</button>
    
    <textarea id="json-output" readonly></textarea>
    <button class="btn-copy" id="btn-copy" onclick="copiarJSON()">📋 COPIAR JSON PRONTO</button>
</div>

<script>
    let workbookData = null;
    const categoriasBase = [
        { id: "expirando", nome: "⚡ Ofertas Expirando", icone: "https://cdn-icons-png.flaticon.com/512/744/744922.png" },
        { id: "casa", nome: "Casa, Móveis e Decoração", icone: "https://img.icons8.com/fluency/96/home.png" },
        { id: "esportes", nome: "Esportes e Fitness", icone: "https://cdn-icons-png.flaticon.com/512/857/857455.png" },
        { id: "eletro", nome: "Eletrodomésticos", icone: "https://cdn-icons-png.flaticon.com/512/2850/2850931.png" },
        { id: "moda", nome: "Calçados, Roupas e Bolsas", icone: "https://cdn-icons-png.flaticon.com/512/3159/3159620.png" },
        { id: "beleza", nome: "Beleza e Cuidado Pessoal", icone: "https://cdn-icons-png.flaticon.com/512/194/194931.png" },
        { id: "informatica", nome: "Informática", icone: "https://cdn-icons-png.flaticon.com/512/2777/2777142.png" },
        { id: "saude", nome: "Saúde", icone: "https://cdn-icons-png.flaticon.com/512/2966/2966327.png" },
        { id: "veiculos", nome: "Acessórios para Veículos", icone: "https://cdn-icons-png.flaticon.com/512/741/741407.png" },
        { id: "ferramentas", nome: "Ferramentas", icone: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png" },
        { id: "construcao", nome: "Construção", icone: "https://cdn-icons-png.flaticon.com/512/4333/4333639.png" },
        { id: "industria", nome: "Indústria e Comércio", icone: "https://cdn-icons-png.flaticon.com/512/2897/2897850.png" },
        { id: "celulares", nome: "Celulares e Telefones", icone: "https://cdn-icons-png.flaticon.com/512/2586/2586488.png" },
        { id: "eletronicos_av", nome: "Eletrônicos, Áudio e Vídeo", icone: "https://cdn-icons-png.flaticon.com/512/3221/3221845.png" },
        { id: "pet", nome: "Pet Shop", icone: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
        { id: "bebes", nome: "Bebês", icone: "https://cdn-icons-png.flaticon.com/512/1043/1043231.png" },
        { id: "brinquedos", nome: "Brinquedos e Hobbies", icone: "https://cdn-icons-png.flaticon.com/512/3082/3082060.png" },
        { id: "joias", nome: "Joias e Relógios", icone: "https://cdn-icons-png.flaticon.com/512/2210/2210606.png" },
        { id: "musica", nome: "Instrumentos Musicais", icone: "https://cdn-icons-png.flaticon.com/512/3221/3221845.png" },
        { id: "arte", nome: "Arte, Papelaria e Armarinho", icone: "https://cdn-icons-png.flaticon.com/512/2232/2232688.png" },
        { id: "games", nome: "Games", icone: "https://cdn-icons-png.flaticon.com/512/686/686589.png" },
        { id: "livros", nome: "Livros, Revista e Comics", icone: "https://cdn-icons-png.flaticon.com/512/3389/3389081.png" },
        { id: "cameras", nome: "Câmeras e Acessórios", icone: "https://cdn-icons-png.flaticon.com/512/685/685655.png" }
    ];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = new Uint8Array(ev.target.result);
            workbookData = XLSX.read(data, {type: 'array'});
            
            processarEstatisticas();
            
            document.getElementById('btn-processar').style.display = 'block';
            dropZone.classList.add('active');
            dropZone.innerHTML = `<strong>✅ Planilha "${file.name}" Carregada!</strong>`;
        };
        reader.readAsArrayBuffer(file);
    };

    function processarEstatisticas() {
        let totalCategorias = 0;
        let totalLinks = 0;
        const listaDiv = document.getElementById('abas-lista');
        listaDiv.innerHTML = "";

        categoriasBase.forEach(cat => {
            const sheet = workbookData.Sheets[cat.nome];
            if (sheet) {
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                const count = rows.length > 0 ? rows.length - 1 : 0;
                if(count >= 0) {
                    totalCategorias++;
                    totalLinks += count;
                    listaDiv.innerHTML += `<span class="aba-badge">${cat.nome}: <b>${count} itens</b></span>`;
                }
            }
        });

        document.getElementById('stat-cat').innerText = totalCategorias;
        document.getElementById('stat-links').innerText = totalLinks;
        document.getElementById('stats-panel').style.display = 'grid';
        document.getElementById('status-details').style.display = 'block';
    }

    function gerarJSON() {
        if (!workbookData) return;
        let finalJson = { "categorias": [] };

        categoriasBase.forEach(cat => {
            const sheet = workbookData.Sheets[cat.nome];
            let produtos = [];
            if (sheet) {
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                rows.forEach((r, i) => {
                    if (i > 0 && r[0]) {
                        produtos.push({
                            "nome": "Carregando...",
                            "preco": "0,00",
                            "imagem": "",
                            "link": String(r[0]).trim()
                        });
                    }
                });
            }
            finalJson.categorias.push({
                "id": cat.id,
                "nome": cat.nome,
                "icone": cat.icone,
                "produtos": produtos
            });
        });

        const output = document.getElementById('json-output');
        output.value = JSON.stringify(finalJson, null, 2);
        output.style.display = 'block';
        document.getElementById('btn-copy').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copiarJSON() {
        const out = document.getElementById('json-output');
        out.select();
        document.execCommand('copy');
        alert("JSON copiado! Salve como produtos.json e execute o script Python para preencher os dados.");
    }
</script>
</body>
</html>
