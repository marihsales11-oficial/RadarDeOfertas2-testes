<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador Excel - Radar de Ofertas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .drop-zone { border: 3px dashed #007bff; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; background: #f8f9fa; transition: 0.3s; margin-bottom: 30px; }
        .drop-zone:hover { background: #e9f2ff; border-color: #0056b3; }
        .status { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: bold; }
        .success { background: #d4edda; color: #155724; display: block; }
        .btn-gen { background: #007bff; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        textarea { width: 100%; height: 300px; margin-top: 20px; display: none; background: #272822; color: #f8f8f2; padding: 15px; border-radius: 8px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Importador Automático de Planilha</h1>
    <p>Arraste seu arquivo <strong>.xlsx</strong> com as 23 abas para gerar o JSON instantaneamente.</p>

    <div class="drop-zone" id="drop-zone">
        <strong>Clique ou Arraste o arquivo do Excel aqui</strong>
        <input type="file" id="file-input" style="display: none;" accept=".xlsx, .xls">
    </div>

    <div id="status-msg" class="status"></div>

    <button class="btn-gen" id="btn-processar" style="display: none;" onclick="gerarJSON()">CONVERTER PLANILHA EM PRODUTOS.JSON</button>
    
    <textarea id="json-output" readonly></textarea>
    <button id="btn-copy" class="btn-gen" style="background: #28a745; margin-top: 10px; display: none;" onclick="copiar()">Copiar JSON para o GitHub</button>
</div>

<script>
    let dadosPlanilha = null;

    // Configuração das categorias (precisam ser iguais aos nomes das abas no Excel)
    const categoriasBase = [
        { id: "expirando", nome: "Ofertas Expirando", icone: "https://cdn-icons-png.flaticon.com/512/744/744922.png" },
        { id: "casa", nome: "Casa, Móveis e Decoração", icone: "https://img.icons8.com/fluency/96/home.png" },
        { id: "esportes", nome: "Esportes e Fitness", icone: "https://cdn-icons-png.flaticon.com/512/857/857455.png" },
        { id: "eletro", nome: "Eletrodomésticos", icone: "https://cdn-icons-png.flaticon.com/512/2850/2850931.png" },
        { id: "moda", nome: "Calçados, Roupas e Bolsas", icone: "https://cdn-icons-png.flaticon.com/512/3159/3159620.png" },
        { id: "beleza", nome: "Beleza e Cuidado Pessoal", icone: "https://cdn-icons-png.flaticon.com/512/194/194931.png" },
        { id: "informatica", nome: "Informática", icone: "https://cdn-icons-png.flaticon.com/512/2777/2777142.png" },
        { id: "saude", nome: "Saúde", icone: "https://cdn-icons-png.flaticon.com/512/2966/2966327.png" },
        { id: "veiculos", nome: "Acessórios para Veículos", icone: "https://cdn-icons-png.flaticon.com/512/741/741407.png" },
        { id: "ferramentas", nome: "Ferramentas", icone: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png" },
        { id: "construcao", nome: "Construção", icone: "https://cdn-icons-png.flaticon.com/512/4333/4333639.png" },
        { id: "industria", nome: "Indústria e Comércio", icone: "https://cdn-icons-png.flaticon.com/512/2897/2897850.png" },
        { id: "celulares", nome: "Celulares e Telefones", icone: "https://cdn-icons-png.flaticon.com/512/2586/2586488.png" },
        { id: "eletronicos_av", nome: "Eletrônicos, Áudio e Vídeo", icone: "https://cdn-icons-png.flaticon.com/512/3221/3221845.png" },
        { id: "pet", nome: "Pet Shop", icone: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
        { id: "bebes", nome: "Bebês", icone: "https://cdn-icons-png.flaticon.com/512/1043/1043231.png" },
        { id: "brinquedos", nome: "Brinquedos e Hobbies", icone: "https://cdn-icons-png.flaticon.com/512/3082/3082060.png" },
        { id: "joias", nome: "Joias e Relógios", icone: "https://cdn-icons-png.flaticon.com/512/2210/2210606.png" },
        { id: "musica", nome: "Instrumentos Musicais", icone: "https://cdn-icons-png.flaticon.com/512/3221/3221845.png" },
        { id: "arte", nome: "Arte, Papelaria e Armarinho", icone: "https://cdn-icons-png.flaticon.com/512/2232/2232688.png" },
        { id: "games", nome: "Games", icone: "https://cdn-icons-png.flaticon.com/512/686/686589.png" },
        { id: "livros", nome: "Livros, Revista e Comics", icone: "https://cdn-icons-png.flaticon.com/512/3389/3389081.png" },
        { id: "cameras", nome: "Câmeras e Acessórios", icone: "https://cdn-icons-png.flaticon.com/512/685/685655.png" }
    ];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            dadosPlanilha = workbook;
            
            document.getElementById('status-msg').innerHTML = `✅ Arquivo "${file.name}" lido com sucesso! ${workbook.SheetNames.length} abas encontradas.`;
            document.getElementById('status-msg').className = "status success";
            document.getElementById('btn-processar').style.display = "block";
        };
        reader.readAsArrayBuffer(file);
    }

    function gerarJSON() {
        if(!dadosPlanilha) return;

        let jsonFinal = { "categorias": [] };

        categoriasBase.forEach(cat => {
            // Tenta achar a aba no Excel com o nome da categoria
            const sheet = dadosPlanilha.Sheets[cat.nome];
            let produtos = [];

            if(sheet) {
                // Converte a aba em uma lista de objetos
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                // Pula a primeira linha (cabeçalho)
                for(let i = 1; i < rows.length; i++) {
                    const r = rows[i];
                    if(r[0]) { // Se tiver descrição
                        produtos.push({
                            "nome": String(r[0]),
                            "preco": "0,00",
                            "imagem": r[1] || "https://picsum.photos/400",
                            "link": r[2] || ""
                        });
                    }
                }
            }

            jsonFinal.categorias.push({
                "id": cat.id,
                "nome": (cat.id === "expirando") ? "⚡ Ofertas Expirando" : cat.nome,
                "icone": cat.icone,
                "produtos": produtos
            });
        });

        const out = document.getElementById('json-output');
        out.value = JSON.stringify(jsonFinal, null, 2);
        out.style.display = 'block';
        document.getElementById('btn-copy').style.display = 'block';
    }

    function copiar() {
        document.getElementById('json-output').select();
        document.execCommand('copy');
        alert("JSON copiado! Agora cole no GitHub.");
    }
</script>

</body>
</html>
