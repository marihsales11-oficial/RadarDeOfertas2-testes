<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador Pro - Radar de Ofertas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Área de Drop Ajustada */
        .drop-zone { 
            border: 3px dashed #007bff; 
            padding: 60px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #f8f9fa; 
            transition: 0.3s; 
            position: relative;
        }
        .drop-zone.dragover { 
            background: #e7f3ff; 
            border-color: #0056b3; 
            transform: scale(1.02);
        }

        .stats-panel { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; border-left: 5px solid #007bff; }
        .stat-card h4 { margin: 0; font-size: 11px; color: #666; text-transform: uppercase; }
        .stat-card span { font-size: 24px; font-weight: bold; }

        #status-details { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #fdfdfd; border: 1px solid #eee; display: none; }
        .aba-badge { display: inline-block; background: #f1f3f5; padding: 6px 12px; margin: 4px; border-radius: 6px; font-size: 13px; border: 1px solid #ddd; }
        
        .btn-gen { background: #007bff; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; display: none; }
        .btn-copy { background: #28a745; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; display: none; margin-top: 10px; }
        textarea { width: 100%; height: 250px; margin-top: 15px; display: none; background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Radar de Ofertas - Importador Automático</h1>
    
    <div class="drop-zone" id="drop-zone">
        <strong id="drop-text">Clique aqui ou Arraste o arquivo Excel (.xlsx)</strong>
        <input type="file" id="file-input" style="display: none;" accept=".xlsx">
    </div>

    <div class="stats-panel" id="stats-panel">
        <div class="stat-card"><h4>Categorias no Excel</h4><span id="stat-cat">0</span></div>
        <div class="stat-card"><h4>Total de Produtos</h4><span id="stat-links">0</span></div>
    </div>

    <div id="status-details">
        <h3 style="margin: 0 0 10px 0; font-size: 14px;">📂 Conferência de Abas:</h3>
        <div id="abas-lista"></div>
    </div>

    <button class="btn-gen" id="btn-processar" onclick="gerarJSON()">1. GERAR JSON PARA O PYTHON</button>
    
    <textarea id="json-output" readonly></textarea>
    <button class="btn-copy" id="btn-copy" onclick="copiarJSON()">📋 COPIAR JSON PRONTO</button>
</div>

<script>
    let workbookData = null;
    const categoriasBase = [
        { id: "expirando", nome: "⚡ Ofertas Expirando", icone: "https://cdn-icons-png.flaticon.com/512/744/744922.png" },
        { id: "casa", nome: "Casa, Móveis e Decoração", icone: "https://img.icons8.com/fluency/96/home.png" },
        { id: "esportes", nome: "Esportes e Fitness", icone: "https://cdn-icons-png.flaticon.com/512/857/857455.png" },
        { id: "eletro", nome: "Eletrodomésticos", icone: "https://cdn-icons-png.flaticon.com/512/2850/2850931.png" },
        { id: "moda", nome: "Calçados, Roupas e Bolsas", icone: "https://cdn-icons-png.flaticon.com/512/3159/3159620.png" },
        { id: "beleza", nome: "Beleza e Cuidado Pessoal", icone: "https://cdn-icons-png.flaticon.com/512/194/194931.png" },
        { id: "informatica", nome: "Informática", icone: "https://cdn-icons-png.flaticon.com/512/2777/2777142.png" },
        { id: "saude", nome: "Saúde", icone: "https://cdn-icons-png.flaticon.com/512/2966/2966327.png" },
        { id: "veiculos", nome: "Acessórios para Veículos", icone: "https://cdn-icons-png.flaticon.com/512/741/741407.png" },
        { id: "ferramentas", nome: "Ferramentas", icone: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png" },
        { id: "construcao", nome: "Construção", icone: "https://cdn-icons-png.flaticon.com/512/4333/4333639.png" },
        { id: "industria", nome: "Indústria e Comércio", icone: "https://cdn-icons-png.flaticon.com/512/2897/2897850.png" },
        { id: "celulares", nome: "Celulares e Telefones", icone: "https://cdn-icons-png.flaticon.com/512/2586/2586488.png" },
        { id: "eletronicos_av", nome: "Eletrônicos, Áudio e Vídeo", icone: "https://cdn-icons-png.flaticon.com/512/3221/3221845.png" },
        { id: "pet", nome: "Pet Shop", icone: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
        { id: "bebes", nome: "Bebês", icone: "https://cdn-icons-png.flaticon.com/512/1043/1043231.png" },
        { id: "brinquedos", nome: "Brinquedos e Hobbies", icone: "https://cdn-icons-png.flaticon.com/512/3082/3082060.png" },
        { id: "joias", nome: "Joias e Relógios", icone: "https://cdn-icons-png.flaticon.com/512/2210/2210606.png" },
        { id: "musica", nome: "Instrumentos Musicais", icone: "https://cdn-icons-png.flaticon.com/512/3221/3221845.png" },
        { id: "arte", nome: "Arte, Papelaria e Armarinho", icone: "https://cdn-icons-png.flaticon.com/512/2232/2232688.png" },
        { id: "games", nome: "Games", icone: "https://cdn-icons-png.flaticon.com/512/686/686589.png" },
        { id: "livros", nome: "Livros, Revista e Comics", icone: "https://cdn-icons-png.flaticon.com/512/3389/3389081.png" },
        { id: "cameras", nome: "Câmeras e Acessórios", icone: "https://cdn-icons-png.flaticon.com/512/685/685655.png" }
    ];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    // PREVENÇÃO DE DOWNLOAD (O PULO DO GATO)
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        handleFile(file);
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        if (!file || !file.name.endsWith('.xlsx')) {
            alert("Por favor, envie um arquivo .xlsx válido!");
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = new Uint8Array(ev.target.result);
            workbookData = XLSX.read(data, {type: 'array'});
            
            mostrarEstatisticas();
            document.getElementById('btn-processar').style.display = 'block';
            document.getElementById('drop-text').innerHTML = `✅ Arquivo: ${file.name}`;
            dropZone.style.borderColor = "#28a745";
        };
        reader.readAsArrayBuffer(file);
    }

    function mostrarEstatisticas() {
        let catCount = 0;
        let linkCount = 0;
        const lista = document.getElementById('abas-lista');
        lista.innerHTML = "";

        categoriasBase.forEach(cat => {
            const sheet = workbookData.Sheets[cat.nome];
            if (sheet) {
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                const qtd = rows.length > 0 ? rows.length - 1 : 0;
                catCount++;
                linkCount += qtd;
                lista.innerHTML += `<span class="aba-badge">${cat.nome}: <b>${qtd}</b></span>`;
            }
        });

        document.getElementById('stat-cat').innerText = catCount;
        document.getElementById('stat-links').innerText = linkCount;
        document.getElementById('stats-panel').style.display = 'grid';
        document.getElementById('status-details').style.display = 'block';
    }

    function gerarJSON() {
        let final = { "categorias": [] };
        categoriasBase.forEach(cat => {
            const sheet = workbookData.Sheets[cat.nome];
            let produtos = [];
            if (sheet) {
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                rows.forEach((r, i) => {
                    if (i > 0 && r[0]) {
                        produtos.push({
                            "nome": "Carregando...",
                            "preco": "0,00",
                            "imagem": "",
                            "link": String(r[0]).trim()
                        });
                    }
                });
            }
            final.categorias.push({ "id": cat.id, "nome": cat.nome, "icone": cat.icone, "produtos": produtos });
        });

        const out = document.getElementById('json-output');
        out.value = JSON.stringify(final, null, 2);
        out.style.display = 'block';
        document.getElementById('btn-copy').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copiarJSON() {
        document.getElementById('json-output').select();
        document.execCommand('copy');
        alert("Copiado! Salve como produtos.json.");
    }
</script>
</body>
</html>
